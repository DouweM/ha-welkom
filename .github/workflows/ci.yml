name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run ruff check
        run: uv run ruff check
      - name: Run ruff format check
        run: uv run ruff format --check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run pyright
        run: uv run pyright

  # hassfest manifest/translation validation is omitted because hacs.json sets
  # content_in_root, so the integration dir is the repo root ("ha-welkom") and
  # hassfest rejects it for not matching the domain ("welkom"). Move the files
  # under custom_components/welkom/ (content_in_root: false) to re-enable it.
