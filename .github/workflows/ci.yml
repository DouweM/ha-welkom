name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run ruff check
        run: uv run ruff check
      - name: Run ruff format check
        run: uv run ruff format --check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run pyright
        run: uv run pyright

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # hacs.json sets content_in_root, so the integration ships from the repo
      # root. hassfest expects custom_components/<domain>/, so stage a copy.
      - name: Stage integration under custom_components/welkom
        run: |
          mkdir -p custom_components/welkom
          cp ./*.py manifest.json strings.json custom_components/welkom/
          cp -r translations custom_components/welkom/
      - uses: home-assistant/actions/hassfest@master
      # HACS store-submission validation (hacs/action@main) only matters for
      # inclusion in the default HACS store; it does not affect installing this
      # as a custom repository. Re-add it here if/when submitting to the store.
